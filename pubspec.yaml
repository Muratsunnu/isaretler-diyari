name: isaretler_diyari
description: "Noktalama işaretleri öğretici koşu oyunu."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.18.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/player/
    - assets/images/bg/
    - assets/images/finish/
    - assets/images/terrain/
    - assets/images/obstacles/
